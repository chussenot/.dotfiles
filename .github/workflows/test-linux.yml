name: Linux

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  install:
    name: Install (${{ matrix.distro }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        distro:
          - Alpine
          - Archlinux
          - Debian-12
          - Fedora-41
          - Ubuntu-24.04
    env:
      TAG: dotfiles-test-${{ matrix.distro }}
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase tag
        run: echo "IMAGE_TAG=$(echo "${TAG}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build test image
        run: |
          docker build \
            -f .tests/docker/${{ matrix.distro }}.Dockerfile \
            -t "${IMAGE_TAG}" .

      - name: Verify installation
        run: |
          docker run --rm "${IMAGE_TAG}" \
            /home/dev/.dotfiles/.tests/check.sh

      - name: Upload install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-log-${{ matrix.distro }}
          path: /tmp/docker-build-*.log
          retention-days: 7
