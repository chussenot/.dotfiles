name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        # Lints every POSIX sh script in the repo (excluding configs/, which
        # holds zsh-specific config files validated separately by pre-commit).
        run: |
          find scripts/ .tests/ bootstrap.sh install.sh \
            -name '*.sh' -print0 | xargs -0 -r shellcheck --shell=sh
