# mise global configuration
# Tools are split into conf.d/*.toml files by category

[settings]
experimental = true

[hooks]
postinstall = 'echo "$MISE_INSTALLED_TOOLS" | jq -e ".[] | select(.name == \"gcloud\")" >/dev/null 2>&1 && gcloud components install gke-gcloud-auth-plugin --quiet || true'

[tools]
"npm:@tsuga/cli" = "latest"
rclone = "latest"
