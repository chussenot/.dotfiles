# mise global configuration
# Tools are split into conf.d/*.toml files by category

[settings]
experimental = true

[tools]
# These intentionally float on "latest" — there's no value in pinning them
# (cli tools that are mostly used interactively and not relied on for
# reproducible builds). Tools with reproducibility requirements live in
# conf.d/*.toml with explicit version pins.
#
# Note: pipx:mkdocs was previously also pinned here at "latest" but it's
# already pinned to a specific version in conf.d/05-dev-tools.toml, which
# overrode this entry — removed to avoid two contradictory sources of truth.
emsdk = "latest"
gemini-cli = "latest"
"npm:@tsuga/cli" = "latest"
"npm:tsuga-cli" = "latest"
"pipx:asciinema" = "latest"
"pipx:frida-tools" = "latest"
rclone = "latest"
