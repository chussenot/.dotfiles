##############################
# Core settings
##############################
set -g mouse on
set -g prefix C-a
bind a send-prefix
unbind C-b

set -sg escape-time 10
set -g focus-events on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true-color support
set -g extended-keys on                     # replaces deprecated xterm-keys
set -g history-limit 50000
set -g bell-action any
setw -g monitor-activity on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off
set -g default-shell /usr/bin/zsh

##############################
# Key bindings
##############################

# Keep your finger on ctrl, or don't
bind ^D detach-client
bind ^C new-window

# Splits: s/v (matching vim logic)
unbind s; unbind ^S
bind s split-window -v -c "#{pane_current_path}"
bind ^S split-window -v -c "#{pane_current_path}"
unbind v; unbind ^V
bind v split-window -h -c "#{pane_current_path}"
bind ^V split-window -h -c "#{pane_current_path}"

# New windows inherit current path
bind c new-window -c "#{pane_current_path}"

# Window navigation
bind ^N next-window
bind ^P previous-window
bind -n "^\\" last-window

# Session navigation
bind -r C-k switch-client -p
bind -r C-j switch-client -n
bind C command-prompt -p "New session:" "new-session -s '%%'"

# Pane navigation (Alt+arrow)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane resize (vi-style, repeatable)
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# Zoom toggle
bind | resize-pane -Z

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Copy mode (vi keys)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

##############################
# THEME — aligned with chussenot zsh theme
# Cyan:   active elements, info
# Green:  success/positive states
# Yellow: warnings, paths, k8s
# Red:    errors/alerts
# Black:  background
# White:  default text
##############################

# Status bar
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-style bg=black,fg=white

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=cyan,bold]#{session_name} #[fg=colour237]│ "

# Right: k8s context (if available)
set -g status-right-length 50
set -g status-right "#[fg=colour237]│ #[fg=yellow]#(kubectl config current-context 2>/dev/null | awk -F_ '{print $NF}')"

# Window tabs
setw -g window-status-format " #[fg=colour244]#I#[fg=colour237]:#[fg=colour244]#W "
setw -g window-status-style fg=colour244,bg=default,dim
setw -g window-status-current-format " #[fg=cyan,bold]#I#[fg=colour237]:#[fg=cyan,bold]#W "
setw -g window-status-current-style fg=cyan,bg=default,bold
setw -g window-status-separator ""
setw -g window-status-activity-style fg=yellow,bg=black
setw -g window-status-bell-style fg=red,bg=black

# Pane background (force black, not terminal default)
setw -g window-style bg=black
setw -g window-active-style bg=black

# Pane borders
set -g pane-border-status bottom
set -g pane-border-format "─"
set -g pane-border-style fg=colour237
set -g pane-active-border-style fg=cyan

# Pane number display
set -g display-panes-active-colour cyan
set -g display-panes-colour yellow

# Clock
setw -g clock-mode-colour green

# Messages
set -g message-style bg=black,fg=yellow

# Session right-click menu
bind -n MouseDown3StatusLeft display-menu -T "#[align=centre]Sessions" -t = -x M -y S \
    "New Session"       "command-prompt -p 'New session name:' 'new-session -s %%'" \
    "" "" \
    "List All Sessions" "choose-tree -Zs" \
    "Detach"            "detach-client" \
    "Kill Session"      "confirm-before -p 'Kill session #S? (y/n)' 'kill-session'"
bind -n MouseDown1Status choose-tree -Zs

##############################
# Plugins (TPM)
##############################
set -g @tpm_plugins '                       \
  tmux-plugins/tpm                          \
  tmux-plugins/tmux-resurrect               \
  tmux-plugins/tmux-continuum               \
  nhdaly/tmux-better-mouse-mode             \
'

set -g @resurrect-processes 'ssh'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @scroll-speed-num-lines-per-scroll 2
set -g @emulate-scroll-for-no-mouse-alternate-buffer 'on'

# Auto-install TPM
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

# Initialize TPM (keep at the very bottom)
run-shell '~/.tmux/plugins/tpm/tpm'
