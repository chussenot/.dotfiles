# Symlink registry: source|target
# Paths use $DOTFILES_DIR and $HOME, expanded at runtime.
# Both setup-symlinks.sh and .tests/check.sh read this file.
# Lines starting with # and blank lines are ignored.

# Shell
configs/shell/zsh/.zshrc|${HOME}/.zshrc
configs/shell/zsh/.zshenv|${HOME}/.zshenv
configs/shell/inputrc|${HOME}/.inputrc
configs/shell/zsh/aliases.zsh|${HOME}/.zsh/aliases.zsh
configs/shell/zsh/functions.zsh|${HOME}/.zsh/functions.zsh
configs/shell/zsh/_completions.zsh|${HOME}/.zsh/_completions.zsh
configs/shell/zsh/.zsh_plugins.txt|${HOME}/.zsh_plugins.txt
configs/shell/fzf/fzf.zsh|${HOME}/.fzf.zsh
configs/shell/fzf/fzf.bash|${HOME}/.fzf.bash

# Terminal
configs/terminal/tmux/tmux.conf|${HOME}/.tmux.conf

# Editor
configs/editor/nvim|${HOME}/.config/nvim
configs/editor/nvim|${HOME}/.vim

# Mise
configs/tools/mise/config.toml|${HOME}/.config/mise/config.toml
configs/tools/mise/conf.d|${HOME}/.config/mise/conf.d

# Git
configs/git/.gitignore_global|${HOME}/.gitignore_global

# Tools
configs/tools/ghostty/config|${HOME}/.config/ghostty/config
configs/tools/gh/config.yml|${HOME}/.config/gh/config.yml
configs/tools/k9s/config.yaml|${HOME}/.config/k9s/config.yaml
configs/tools/htop/htoprc|${HOME}/.config/htop/htoprc
configs/tools/glow/glow.yml|${HOME}/.config/glow/glow.yml
configs/tools/bat/config|${HOME}/.config/bat/config
configs/tools/tig/tigrc|${HOME}/.tigrc
configs/tools/gau/config.toml|${HOME}/.gau.toml
configs/tools/gcloud/.default-cloud-sdk-components|${HOME}/.default-cloud-sdk-components
configs/tools/krew/plugins.txt|${HOME}/.krew-plugins
